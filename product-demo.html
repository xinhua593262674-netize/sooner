<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>专项复习产品 Demo</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #1769ff;
      --blue-dark: #0757e8;
      --orange: #ff7a1a;
      --green: #22bd68;
      --red: #f04b3f;
      --ink: #121b2d;
      --muted: #697386;
      --soft: #f4f7fb;
      --line: #e6ebf4;
      --shadow: 0 24px 70px rgba(20, 52, 102, 0.16);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 12%, rgba(23, 105, 255, 0.13), transparent 28rem),
        linear-gradient(135deg, #f8fbff 0%, #edf3fb 48%, #f9fbff 100%);
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .demo-shell {
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(340px, 1.1fr);
      gap: 40px;
      width: min(1240px, calc(100vw - 48px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 42px 0;
      align-items: center;
    }

    .story-panel {
      display: grid;
      align-content: center;
      gap: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 7px 12px;
      border: 1px solid rgba(23, 105, 255, 0.18);
      border-radius: 999px;
      color: var(--blue-dark);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
    }

    .eyebrow::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(32, 167, 107, 0.12);
      content: "";
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin: 0;
      color: #445166;
      font-size: 18px;
      line-height: 1.75;
    }

    .value-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      max-width: 620px;
    }

    .value-item {
      min-height: 78px;
      padding: 14px 12px;
      border: 1px solid rgba(23, 105, 255, 0.15);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
    }

    .value-item strong {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .value-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .current-step {
      max-width: 620px;
      border: 1px solid rgba(18, 32, 51, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 16px 48px rgba(20, 52, 102, 0.08);
      overflow: hidden;
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .step-kicker {
      margin: 0 0 4px;
      color: var(--blue-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .step-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .step-copy {
      min-height: 92px;
      margin: 0;
      padding: 16px 20px 20px;
      color: #4b586b;
      font-size: 15px;
      line-height: 1.75;
    }

    .controls, .timeline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 620px;
    }

    .control-btn, .timeline-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .control-btn {
      min-width: 44px;
      padding: 0 16px;
    }

    .control-btn:hover, .control-btn:focus-visible,
    .timeline-btn:hover, .timeline-btn:focus-visible {
      border-color: rgba(23, 105, 255, 0.38);
      background: #fff;
      transform: translateY(-1px);
      outline: none;
    }

    .control-btn.primary {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
      box-shadow: 0 12px 24px rgba(23, 105, 255, 0.24);
    }

    .timeline-btn {
      min-height: 34px;
      padding: 0 11px;
      border-color: rgba(23, 105, 255, 0.15);
      border-radius: 999px;
      color: #415069;
      font-size: 13px;
    }

    .timeline-btn.is-active {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    .phone-stage {
      display: grid;
      justify-items: center;
      gap: 16px;
      min-width: 0;
    }

    .phone-frame {
      position: relative;
      width: min(390px, 84vw);
      aspect-ratio: 852 / 1847;
      padding: 10px;
      border-radius: 42px;
      background: #111827;
      box-shadow: var(--shadow);
    }

    .phone-frame::before {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 6;
      width: 34%;
      height: 24px;
      border-radius: 0 0 18px 18px;
      background: #111827;
      transform: translateX(-50%);
      content: "";
    }

    .phone-screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 32px;
      background: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #fff;
    }

    .status {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 46px;
      padding: 12px 22px 0;
      font-weight: 800;
      font-size: 15px;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #0f172a;
    }

    .battery {
      padding: 1px 5px;
      border-radius: 5px;
      color: #fff;
      background: #111827;
      font-size: 11px;
    }

    .app-header {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      min-height: 54px;
      padding: 0 16px;
      border-bottom: 1px solid transparent;
    }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      color: #111827;
      background: transparent;
      font-size: 24px;
      line-height: 1;
    }

    .icon-btn:hover { background: #f1f5fb; }

    .app-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
    }

    .tabs {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      position: relative;
      height: 48px;
      color: #8a93a3;
      background: #fff;
      font-size: 15px;
      font-weight: 800;
    }

    .tab.is-active { color: var(--ink); }

    .tab.is-active::after {
      position: absolute;
      left: 50%;
      bottom: 5px;
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: var(--blue);
      transform: translateX(-50%);
      content: "";
    }

    .content {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px;
      background: #fff;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar { display: none; }

    .entry-card {
      margin: 2px 0 18px;
      padding: 18px 14px;
      border: 1px solid #a9c7ff;
      border-radius: 8px;
      background: linear-gradient(105deg, #fafdff 0%, #fff 45%, #f4f8ff 100%);
    }

    .entry-main {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .entry-illu {
      display: grid;
      place-items: center;
      width: 70px;
      height: 70px;
      border-radius: 18px;
      color: var(--blue);
      background: #edf5ff;
      font-size: 32px;
      font-weight: 900;
    }

    .entry-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.1;
    }

    .entry-card p {
      margin: 0;
      color: #6b7484;
      font-size: 13px;
      line-height: 1.55;
    }

    .pill-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e8edf6;
    }

    .pill-row span {
      color: #273348;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .primary-btn {
      min-width: 86px;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 15px;
      color: #fff;
      background: linear-gradient(135deg, #1680ff, #0757ef);
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(23, 105, 255, 0.22);
    }

    .ghost-btn {
      min-height: 34px;
      padding: 0 13px;
      border: 1px solid #d9e1ee;
      border-radius: 999px;
      color: #4b5567;
      background: #f7f9fc;
      font-weight: 800;
    }

    .ghost-btn.is-active {
      border-color: var(--blue);
      color: var(--blue-dark);
      background: #eef5ff;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 18px 0 12px;
      font-size: 20px;
      font-weight: 900;
    }

    .section-title span {
      color: #6b7484;
      font-size: 12px;
      font-weight: 700;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
    }

    .wrong-item, .recommend-card, .tree-card, .point-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .wrong-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 14px;
    }

    .wrong-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .wrong-item span {
      color: #7b8494;
      font-size: 12px;
    }

    .vip-card {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      color: #8a4e00;
      background: linear-gradient(135deg, #fff3d8, #ffe3aa);
    }

    .vip-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: -16px -16px 16px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: center;
    }

    .stats span {
      display: block;
      color: #6b7484;
      font-size: 12px;
    }

    .stats strong {
      color: var(--blue);
      font-size: 18px;
    }

    .recommend-card {
      overflow: hidden;
      border-color: #ffb37a;
      background: #fffaf5;
    }

    .recommend-lead {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid #ffe1cc;
    }

    .rank {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: var(--orange);
      background: #fff1e7;
      font-weight: 900;
    }

    .recommend-lead h3, .point-row h4 {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.25;
    }

    .recommend-lead p, .point-row p {
      margin: 0;
      color: #6f7a8d;
      font-size: 12px;
    }

    .recommend-sub {
      display: grid;
      gap: 0;
      background: #fff;
    }

    .recommend-sub button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 0 14px;
      border-top: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      text-align: left;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 7px;
      color: var(--blue-dark);
      background: #eef5ff;
      border: 1px solid #b9d1ff;
      font-size: 12px;
      font-weight: 800;
    }

    .tag.orange {
      color: #f06712;
      background: #fff2e9;
      border-color: #ffbd91;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .tree-card {
      overflow: hidden;
    }

    .chapter {
      border-top: 1px solid var(--line);
    }

    .chapter:first-child { border-top: 0; }

    .chapter-head {
      display: grid;
      grid-template-columns: 28px 1fr auto 24px;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 56px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      text-align: left;
    }

    .chapter-head strong { font-size: 15px; }
    .chapter-head span { color: #758096; font-size: 12px; }

    .plus {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--blue);
      border-radius: 5px;
      color: var(--blue);
      font-size: 18px;
      font-weight: 900;
    }

    .point-list {
      margin: 0 12px 12px 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .point-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 72px;
      padding: 10px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      color: var(--ink);
      text-align: left;
    }

    .point-row:last-child { border-bottom: 0; }

    .point-index {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      color: var(--blue-dark);
      background: #eef5ff;
      font-weight: 900;
    }

    .link-btn {
      width: 100%;
      min-height: 48px;
      color: var(--blue-dark);
      background: #fff;
      font-weight: 900;
    }

    .practice-header {
      flex: 0 0 auto;
      padding: 8px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .stages {
      display: grid;
      grid-template-columns: 1fr 34px 1fr 34px 1fr;
      align-items: center;
      gap: 6px;
      color: #9aa3b2;
      font-weight: 900;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .stage-num {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      color: #fff;
      background: #c2c8d4;
      font-size: 13px;
    }

    .stage.is-active { color: var(--blue); }
    .stage.is-active .stage-num { background: var(--blue); }
    .stage.is-done { color: var(--green); }
    .stage.is-done .stage-num { background: var(--green); }

    .stage-line {
      height: 2px;
      background: #dce2ec;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      color: #697386;
      font-size: 13px;
    }

    .progress-bar {
      height: 5px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8edf5;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
      transition: width 220ms ease;
    }

    .flashcard {
      display: flex;
      flex-direction: column;
      min-height: 520px;
      padding: 24px 20px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 12px 40px rgba(23, 105, 255, 0.13);
    }

    .flashcard small {
      color: #7c89a2;
      font-size: 15px;
    }

    .flashcard h3 {
      margin: 34px 0 28px;
      font-size: 24px;
      line-height: 1.45;
    }

    .answer-block {
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .answer-block strong {
      display: block;
      margin-bottom: 12px;
      color: var(--blue);
      font-size: 18px;
    }

    .answer-block p {
      margin: 0;
      font-size: 17px;
      line-height: 1.8;
    }

    .practice-actions {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .practice-actions .primary-btn,
    .practice-actions .ghost-large {
      min-height: 58px;
      border-radius: 28px;
      font-size: 18px;
    }

    .ghost-large {
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .question-title {
      margin: 24px 0 28px;
      font-size: 22px;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 18px;
    }

    .option {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      min-height: 52px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      font-size: 18px;
    }

    .option-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid #aeb8c8;
      border-radius: 50%;
      font-weight: 900;
    }

    .option.is-selected .option-mark {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .analysis {
      margin-top: 22px;
      padding: 14px;
      border-radius: 12px;
      background: #f5f9ff;
      border: 1px solid #cfe0ff;
      color: #344156;
      line-height: 1.7;
      font-size: 14px;
    }

    .bottom-bar {
      flex: 0 0 auto;
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .bottom-bar .primary-btn {
      width: 100%;
      min-height: 58px;
      border-radius: 28px;
      font-size: 18px;
    }

    .report-card {
      margin-top: 18px;
      padding: 22px 18px;
      border-radius: 18px;
      background: #f6f9ff;
      border: 1px solid #dbe7ff;
      text-align: center;
    }

    .report-card h2 {
      margin: 10px 0;
      font-size: 24px;
    }

    .score {
      display: grid;
      place-items: center;
      width: 112px;
      height: 112px;
      margin: 8px auto 18px;
      border-radius: 50%;
      color: var(--blue);
      background: #fff;
      border: 8px solid #cfe1ff;
      font-size: 30px;
      font-weight: 900;
    }

    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .metric {
      padding: 12px 8px;
      border-radius: 10px;
      background: #fff;
    }

    .metric strong {
      display: block;
      margin-bottom: 4px;
      font-size: 20px;
    }

    .metric span {
      color: #748096;
      font-size: 12px;
    }

    .modal-mask {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      align-items: end;
      background: rgba(13, 22, 38, 0.42);
    }

    .pay-modal {
      padding: 22px 18px 26px;
      border-radius: 22px 22px 0 0;
      background: #fff;
      box-shadow: 0 -18px 44px rgba(18, 32, 51, 0.18);
    }

    .pay-modal h3 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .pay-modal p {
      margin: 0 0 16px;
      color: #677386;
      line-height: 1.65;
    }

    .pay-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 32px;
      z-index: 30;
      width: max-content;
      max-width: 84%;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(18, 32, 51, 0.88);
      font-size: 13px;
      font-weight: 800;
      transform: translateX(-50%);
      animation: toastIn 1600ms ease forwards;
    }

    @keyframes toastIn {
      0% { opacity: 0; transform: translate(-50%, 8px); }
      12%, 86% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, 8px); }
    }

    .hint-row {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 920px) {
      .demo-shell {
        grid-template-columns: 1fr;
        gap: 30px;
        padding: 28px 0 36px;
      }
      .value-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .phone-stage { order: -1; }
      .phone-frame { width: min(360px, 78vw); }
    }

    @media (max-width: 520px) {
      .demo-shell { width: min(100vw - 24px, 1240px); }
      .value-strip { grid-template-columns: 1fr; }
      .step-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <section class="story-panel">
      <div class="eyebrow">方案 C 真实交互 Demo</div>
      <h1>专项复习</h1>
      <p class="lead">这是一个可直接点击的产品原型。会员开通、筛选、展开收起、查看全部考点、闪卡推进、答题和解析都会真实改变页面状态。</p>

      <div class="value-strip">
        <div class="value-item"><strong>定位错因</strong><span>从错题记录反推薄弱考点</span></div>
        <div class="value-item"><strong>巩固考点</strong><span>先背闪卡再进入练习</span></div>
        <div class="value-item"><strong>错题重做</strong><span>原题乱序，避免记答案</span></div>
        <div class="value-item"><strong>变式提升</strong><span>用新题验证是否掌握</span></div>
      </div>

      <article class="current-step" aria-live="polite">
        <div class="step-head">
          <div>
            <p class="step-kicker" id="stepKicker">入口</p>
            <h2 class="step-title" id="stepTitle">错题集入口</h2>
          </div>
        </div>
        <p class="step-copy" id="stepCopy">未开通会员点击“去复习”会弹出开通会员弹窗；开通后再次进入专项复习。</p>
      </article>

      <div class="controls">
        <button class="control-btn" type="button" id="resetBtn">重置 Demo</button>
        <button class="control-btn primary" type="button" id="quickBtn">走主流程</button>
      </div>

      <nav class="timeline" id="timeline"></nav>
    </section>

    <section class="phone-stage">
      <div class="phone-frame">
        <div class="phone-screen" id="phone"></div>
      </div>
      <div class="hint-row">手机区域内的按钮都可以直接点击</div>
    </section>
  </main>

  <script>
    const points = [
      { id: 1, name: "资金时间价值计算基础", chapter: "第1章 资金时间价值计算", status: "推荐", wrong: 6, reason: "公式记忆不准" },
      { id: 2, name: "现值与终值换算", chapter: "第1章 资金时间价值计算", status: "建议重练", wrong: 4, reason: "计算公式混淆" },
      { id: 3, name: "经济效果评价指标", chapter: "第1章 资金时间价值计算", status: "未练习", wrong: 5, reason: "指标适用混淆" },
      { id: 4, name: "名义利率与有效利率", chapter: "第1章 资金时间价值计算", status: "未练习", wrong: 3, reason: "概念混淆" },
      { id: 5, name: "等值计算应用", chapter: "第1章 资金时间价值计算", status: "未练习", wrong: 2, reason: "等值转换错误" },
      { id: 6, name: "方案比选原则", chapter: "第2章 技术方案经济效果评价", status: "推荐", wrong: 3, reason: "判别口径混乱" },
      { id: 7, name: "设备更新分析", chapter: "第3章 设备更新分析", status: "建议重练", wrong: 4, reason: "沉没成本误判" },
      { id: 8, name: "租赁与购买决策", chapter: "第3章 设备更新分析", status: "未练习", wrong: 1, reason: "现金流识别不清" }
    ];

    const flashcards = [
      {
        q: "资金时间价值计算中，现值与终值换算的核心公式是什么？",
        a: "终值公式：F=P(1+i)^n。现值公式：P=F/(1+i)^n。其中 i 为利率，n 为期数。"
      },
      {
        q: "做现值与终值题时，最容易混淆的判断点是什么？",
        a: "先判断题目问的是现在的钱还是未来的钱，再决定使用现值公式或终值公式。"
      }
    ];

    const questions = {
      wrong: {
        total: 5,
        stage: "错题",
        title: "某企业拟进行资金时间价值计算，关于现值与终值换算的说法，正确的是（ ）。",
        source: "本题来自历史错题，仅调整选项顺序",
        correct: "C",
        options: [
          ["A", "现值一定大于终值"],
          ["B", "终值与利率无关"],
          ["C", "终值等于现值乘以复利系数"],
          ["D", "期数变化不影响换算结果"]
        ],
        analysis: "终值 F=P(1+i)^n，等于现值乘以复利系数，因此选 C。"
      },
      variant: {
        total: 3,
        stage: "变式题",
        title: "某项目期初投入100万元，年利率为5%，按复利计算，2年后的终值最接近（ ）。",
        source: "本题用于验证考点迁移应用",
        correct: "B",
        options: [
          ["A", "105万元"],
          ["B", "110.25万元"],
          ["C", "115万元"],
          ["D", "120.5万元"]
        ],
        analysis: "F=100×(1+5%)^2=110.25万元，因此选 B。"
      }
    };

    const copy = {
      entry: ["入口", "错题集入口", "未开通会员点击“去复习”会弹出开通会员弹窗；开通后再次进入专项复习。"],
      special: ["专项复习", "考点推荐", "筛选按钮会真实过滤列表；章节可以展开收起；查看全部考点会展示完整考点列表。"],
      flash: ["练习播放器", "背诵闪卡", "点击“记住了”推进到下一张闪卡，完成 2 张后进入错题练习。"],
      wrong: ["练习播放器", "错题练习", "选择选项后点击查看解析；解析展示后再次点击进入变式题。"],
      variant: ["练习播放器", "变式题练习", "变式题会记录选择并展示解析，完成后生成报告。"],
      report: ["报告", "考点报告", "报告会根据错题与变式题答题结果生成“已掌握”或“建议重练”。"]
    };

    const state = {
      screen: "entry",
      member: false,
      payOpen: false,
      subject: "经济",
      filter: "全部",
      expanded: {
        "第1章 资金时间价值计算": true,
        "第2章 技术方案经济效果评价": false,
        "第3章 设备更新分析": false
      },
      showAll: false,
      selectedPoint: points[0],
      flashIndex: 0,
      answer: {
        wrong: null,
        variant: null
      },
      analysisOpen: {
        wrong: false,
        variant: false
      },
      toast: ""
    };

    const phone = document.querySelector("#phone");
    const stepKicker = document.querySelector("#stepKicker");
    const stepTitle = document.querySelector("#stepTitle");
    const stepCopy = document.querySelector("#stepCopy");
    const timeline = document.querySelector("#timeline");

    function setStep(key) {
      const text = copy[key];
      stepKicker.textContent = text[0];
      stepTitle.textContent = text[1];
      stepCopy.textContent = text[2];
      [...timeline.children].forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.screen === key);
      });
    }

    function setScreen(screen) {
      state.screen = screen;
      render();
    }

    function notify(text) {
      state.toast = text;
      render();
      window.clearTimeout(notify.timer);
      notify.timer = window.setTimeout(() => {
        state.toast = "";
        render();
      }, 1500);
    }

    function appShell(body, extra = "") {
      return `
        <div class="app">
          <div class="status"><span>10:11</span><span class="signal">5G <span class="battery">56</span></span></div>
          ${body}
        </div>
        ${extra}
        ${state.toast ? `<div class="toast">${state.toast}</div>` : ""}
      `;
    }

    function header(title, right = "", back = "") {
      return `
        <div class="app-header">
          <button class="icon-btn" type="button" data-action="${back || "back-entry"}" aria-label="返回">‹</button>
          <div class="app-title">${title}</div>
          <div>${right}</div>
        </div>
      `;
    }

    function subjectTabs() {
      return `
        <div class="tabs">
          ${["建筑实务", "法规", "经济", "管理"].map((tab) => `
            <button class="tab ${state.subject === tab ? "is-active" : ""}" type="button" data-action="subject" data-value="${tab}">${tab}</button>
          `).join("")}
        </div>
      `;
    }

    function renderEntry() {
      const payModal = state.payOpen ? `
        <div class="modal-mask">
          <div class="pay-modal">
            <h3>开通会员后使用专项复习</h3>
            <p>专项复习会根据错题记录推荐薄弱考点，并生成闪卡、错题和变式题练习路径。</p>
            <div class="pay-actions">
              <button class="ghost-large" type="button" data-action="close-pay">先看看</button>
              <button class="primary-btn" type="button" data-action="open-member">立即开通</button>
            </div>
          </div>
        </div>
      ` : "";

      const body = `
        ${header("错题集", `<button class="icon-btn" type="button" data-action="noop">⌫</button>`, "noop")}
        ${subjectTabs()}
        <div class="content">
          <section class="entry-card">
            <div class="entry-main">
              <div class="entry-illu">AI</div>
              <div>
                <h2>专项复习</h2>
                <p>依据做题记录，剖析错因，推送考点复习</p>
              </div>
              <button class="primary-btn" type="button" data-action="enter-special">去复习</button>
            </div>
            <div class="pill-row">
              <span>定位错因</span>
              <span>巩固考点</span>
              <span>错题重做</span>
              <span>变式提升</span>
            </div>
          </section>
          <div class="wrong-list">
            ${["第1篇 工程经济", "第2篇 工程财务", "第3篇 工程计价", "第4篇 历年过时真题"].map((name, idx) => `
              <div class="wrong-item">
                <div>
                  <strong>${name}</strong>
                  <span>共 ${[13, 1, 2, 5][idx]} 道错题　已做对 ${idx === 0 ? 5 : 0} 道</span>
                </div>
                <span class="tag">编辑</span>
              </div>
            `).join("")}
          </div>
          <div class="vip-card"><strong>VIP专属权益</strong><span>一键导出错题，生成专属错题文档</span></div>
        </div>
      `;
      return appShell(body, payModal);
    }

    function filteredPoints() {
      const base = state.showAll ? points : points.slice(0, 5);
      if (state.filter === "全部") return base;
      return base.filter((point) => point.status === state.filter);
    }

    function groupedPoints() {
      return filteredPoints().reduce((acc, point) => {
        acc[point.chapter] ||= [];
        acc[point.chapter].push(point);
        return acc;
      }, {});
    }

    function renderSpecial() {
      const groups = groupedPoints();
      const body = `
        ${header("专项复习", `<button class="icon-btn" type="button" data-action="refresh">↻</button>`)}
        ${subjectTabs()}
        <div class="content">
          <div class="stats">
            <div><span>待掌握</span><strong>128</strong></div>
            <div><span>待练考点</span><strong>24</strong></div>
            <div><span>已掌握</span><strong style="color:var(--green)">36</strong></div>
          </div>
          <div class="section-title">今日推荐 <span>优先完成这 3 个考点</span></div>
          <section class="recommend-card">
            <div class="recommend-lead">
              <div class="rank">1</div>
              <div>
                <h3>${points[0].name}</h3>
                <p>第1篇 工程经济 / ${points[0].chapter}　${points[0].wrong}道错题　${points[0].reason}</p>
              </div>
              <button class="primary-btn" type="button" data-action="practice" data-id="1">立即练习</button>
            </div>
            <div class="recommend-sub">
              ${points.slice(1, 3).map((point, i) => `
                <button type="button" data-action="select-point" data-id="${point.id}">
                  <strong>${i + 2}　${point.name}</strong>
                  <span class="tag ${point.status === "建议重练" ? "orange" : ""}">${point.status}</span>
                </button>
              `).join("")}
            </div>
          </section>

          <div class="section-title">复习专区</div>
          <div class="filters">
            ${["全部", "推荐", "建议重练", "未练习"].map((filter) => `
              <button class="ghost-btn ${state.filter === filter ? "is-active" : ""}" type="button" data-action="filter" data-value="${filter}">${filter}</button>
            `).join("")}
          </div>
          <section class="tree-card">
            ${Object.entries(groups).map(([chapter, items]) => `
              <div class="chapter">
                <button class="chapter-head" type="button" data-action="toggle-chapter" data-value="${chapter}">
                  <span class="plus">${state.expanded[chapter] ? "-" : "+"}</span>
                  <strong>${chapter}</strong>
                  <span>${items.length}个待练考点</span>
                  <span>${state.expanded[chapter] ? "⌃" : "⌄"}</span>
                </button>
                ${state.expanded[chapter] ? `
                  <div class="point-list">
                    ${items.map((point, idx) => `
                      <button class="point-row" type="button" data-action="practice" data-id="${point.id}">
                        <span class="point-index">${idx + 1}</span>
                        <span><h4>${point.name}</h4><p>${point.wrong}道错题　${point.reason}</p></span>
                        <span class="tag ${point.status === "建议重练" ? "orange" : ""}">${point.status}</span>
                      </button>
                    `).join("")}
                    ${chapter === "第1章 资金时间价值计算" ? `<button class="link-btn" type="button" data-action="show-all">${state.showAll ? "收起全部考点" : "查看全部 8 个考点"} ›</button>` : ""}
                  </div>
                ` : ""}
              </div>
            `).join("") || `<div class="wrong-item"><strong>暂无符合筛选的考点</strong><span>切换筛选条件后再查看</span></div>`}
          </section>
        </div>
      `;
      return appShell(body);
    }

    function stageHeader(active) {
      const done = {
        flash: active !== "flash",
        wrong: active === "variant" || active === "report",
        variant: active === "report"
      };
      const cls = (name) => done[name] ? "is-done" : active === name ? "is-active" : "";
      return `
        ${header("专项复习", `<button class="icon-btn" type="button" data-action="back-special">×</button>`, "back-special")}
        <div class="practice-header">
          <div class="stages">
            <div class="stage ${cls("flash")}"><span class="stage-num">${done.flash ? "✓" : "1"}</span>闪卡</div>
            <div class="stage-line"></div>
            <div class="stage ${cls("wrong")}"><span class="stage-num">${done.wrong ? "✓" : "2"}</span>错题</div>
            <div class="stage-line"></div>
            <div class="stage ${cls("variant")}"><span class="stage-num">${done.variant ? "✓" : "3"}</span>变式题</div>
          </div>
        </div>
      `;
    }

    function renderFlash() {
      const card = flashcards[state.flashIndex];
      const body = `
        ${stageHeader("flash")}
        <div class="content" style="background:#edf5ff;">
          <div class="progress-row"><span>知识点闪卡</span><strong>${state.flashIndex + 1}/${flashcards.length}</strong></div>
          <div class="progress-bar"><span style="width:${((state.flashIndex + 1) / flashcards.length) * 100}%"></span></div>
          <article class="flashcard">
            <small>AI 知识点闪卡</small>
            <h3>${card.q}</h3>
            <div class="answer-block">
              <strong>答案</strong>
              <p>${card.a}</p>
            </div>
          </article>
        </div>
        <div class="practice-actions">
          <button class="ghost-large" type="button" data-action="flash-review">再复习</button>
          <button class="primary-btn" type="button" data-action="flash-remember">记住了</button>
        </div>
      `;
      return appShell(body);
    }

    function renderQuestion(kind) {
      const item = questions[kind];
      const current = kind === "wrong" ? 1 : 1;
      const hasSelected = Boolean(state.answer[kind]);
      const analysis = state.analysisOpen[kind];
      const body = `
        ${stageHeader(kind)}
        <div class="content">
          <div class="progress-row"><span>第1篇 工程经济</span><strong>${current}/${item.total}</strong></div>
          <div class="progress-bar"><span style="width:${(current / item.total) * 100}%"></span></div>
          <div style="margin-top:18px;color:#6c7687;font-size:13px;">单项选择题　${item.stage}</div>
          <h3 class="question-title">${item.title}</h3>
          <div class="options">
            ${item.options.map(([key, text]) => `
              <button class="option ${state.answer[kind] === key ? "is-selected" : ""}" type="button" data-action="answer" data-kind="${kind}" data-value="${key}">
                <span class="option-mark">${key}</span>
                <span>${text}</span>
              </button>
            `).join("")}
          </div>
          ${analysis ? `<div class="analysis"><strong>${state.answer[kind] === item.correct ? "回答正确" : "建议再看一遍"}</strong><br>${item.analysis}</div>` : ""}
        </div>
        <div class="bottom-bar">
          <button class="primary-btn" type="button" data-action="analysis" data-kind="${kind}">${analysis ? (kind === "wrong" ? "进入变式题" : "生成报告") : "查看解析"}</button>
          <div style="margin-top:10px;color:#7b8494;font-size:12px;text-align:center;">${hasSelected ? item.source : "请选择一个答案"}</div>
        </div>
      `;
      return appShell(body);
    }

    function renderReport() {
      const mastered = state.answer.wrong === questions.wrong.correct && state.answer.variant === questions.variant.correct;
      const score = mastered ? 92 : 68;
      const body = `
        ${header("考点报告", "", "back-special")}
        <div class="content">
          <article class="report-card">
            <div class="score">${score}</div>
            <h2>${mastered ? "已掌握" : "建议重练"}</h2>
            <p style="margin:0;color:#667386;line-height:1.7;">${mastered ? "本次专项复习已完成，错题和变式题均能正确迁移。" : "本考点仍存在不稳定项，建议重新完成闪卡和题目练习。"}</p>
            <div class="report-grid">
              <div class="metric"><strong>2/2</strong><span>闪卡完成</span></div>
              <div class="metric"><strong>${state.answer.wrong === questions.wrong.correct ? "正确" : "错误"}</strong><span>错题练习</span></div>
              <div class="metric"><strong>${state.answer.variant === questions.variant.correct ? "正确" : "错误"}</strong><span>变式题</span></div>
              <div class="metric"><strong>${state.selectedPoint.wrong}</strong><span>关联错题</span></div>
            </div>
          </article>
        </div>
        <div class="practice-actions">
          <button class="ghost-large" type="button" data-action="restart-practice">重新练习</button>
          <button class="primary-btn" type="button" data-action="back-special">继续复习</button>
        </div>
      `;
      return appShell(body);
    }

    function render() {
      if (state.screen === "entry") {
        setStep("entry");
        phone.innerHTML = renderEntry();
      }
      if (state.screen === "special") {
        setStep("special");
        phone.innerHTML = renderSpecial();
      }
      if (state.screen === "flash") {
        setStep("flash");
        phone.innerHTML = renderFlash();
      }
      if (state.screen === "wrong") {
        setStep("wrong");
        phone.innerHTML = renderQuestion("wrong");
      }
      if (state.screen === "variant") {
        setStep("variant");
        phone.innerHTML = renderQuestion("variant");
      }
      if (state.screen === "report") {
        setStep("report");
        phone.innerHTML = renderReport();
      }
    }

    function startPractice(pointId = 1) {
      state.selectedPoint = points.find((point) => point.id === Number(pointId)) || points[0];
      state.flashIndex = 0;
      state.answer.wrong = null;
      state.answer.variant = null;
      state.analysisOpen.wrong = false;
      state.analysisOpen.variant = false;
      setScreen("flash");
    }

    function handleAction(target) {
      const action = target.dataset.action;
      if (!action) return;

      if (action === "noop") return;
      if (action === "back-entry") return setScreen("entry");
      if (action === "back-special") return setScreen("special");
      if (action === "subject") {
        state.subject = target.dataset.value;
        notify(`已切换到${state.subject}`);
        return;
      }
      if (action === "enter-special") {
        if (!state.member) {
          state.payOpen = true;
          return render();
        }
        return setScreen("special");
      }
      if (action === "close-pay") {
        state.payOpen = false;
        return render();
      }
      if (action === "open-member") {
        state.member = true;
        state.payOpen = false;
        notify("会员已开通");
        setScreen("special");
        return;
      }
      if (action === "refresh") {
        notify("推荐已刷新");
        return;
      }
      if (action === "filter") {
        state.filter = target.dataset.value;
        state.showAll = state.filter === "全部" ? state.showAll : true;
        return render();
      }
      if (action === "toggle-chapter") {
        const chapter = target.dataset.value;
        state.expanded[chapter] = !state.expanded[chapter];
        return render();
      }
      if (action === "show-all") {
        state.showAll = !state.showAll;
        return render();
      }
      if (action === "select-point") {
        state.selectedPoint = points.find((point) => point.id === Number(target.dataset.id)) || points[0];
        notify(`已选择：${state.selectedPoint.name}`);
        return;
      }
      if (action === "practice") {
        return startPractice(target.dataset.id);
      }
      if (action === "flash-review") {
        state.flashIndex = 0;
        notify("已加入再复习");
        return render();
      }
      if (action === "flash-remember") {
        if (state.flashIndex < flashcards.length - 1) {
          state.flashIndex += 1;
          return render();
        }
        return setScreen("wrong");
      }
      if (action === "answer") {
        const kind = target.dataset.kind;
        state.answer[kind] = target.dataset.value;
        state.analysisOpen[kind] = false;
        return render();
      }
      if (action === "analysis") {
        const kind = target.dataset.kind;
        if (!state.answer[kind]) {
          notify("请先选择答案");
          return;
        }
        if (!state.analysisOpen[kind]) {
          state.analysisOpen[kind] = true;
          return render();
        }
        return setScreen(kind === "wrong" ? "variant" : "report");
      }
      if (action === "restart-practice") {
        return startPractice(state.selectedPoint.id);
      }
    }

    function renderTimeline() {
      const items = [
        ["entry", "入口"],
        ["special", "专项复习"],
        ["flash", "闪卡"],
        ["wrong", "错题"],
        ["variant", "变式题"],
        ["report", "报告"]
      ];
      timeline.innerHTML = items.map(([screen, label]) => `<button class="timeline-btn" type="button" data-screen="${screen}">${label}</button>`).join("");
    }

    phone.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (target) handleAction(target);
    });

    timeline.addEventListener("click", (event) => {
      const target = event.target.closest("[data-screen]");
      if (!target) return;
      setScreen(target.dataset.screen);
    });

    document.querySelector("#resetBtn").addEventListener("click", () => {
      state.screen = "entry";
      state.member = false;
      state.payOpen = false;
      state.filter = "全部";
      state.showAll = false;
      state.flashIndex = 0;
      state.answer.wrong = null;
      state.answer.variant = null;
      state.analysisOpen.wrong = false;
      state.analysisOpen.variant = false;
      render();
    });

    document.querySelector("#quickBtn").addEventListener("click", () => {
      if (state.screen === "entry") {
        state.member = true;
        return setScreen("special");
      }
      if (state.screen === "special") return startPractice(1);
      if (state.screen === "flash") {
        if (state.flashIndex < flashcards.length - 1) {
          state.flashIndex += 1;
          return render();
        }
        return setScreen("wrong");
      }
      if (state.screen === "wrong") {
        state.answer.wrong ||= "C";
        if (!state.analysisOpen.wrong) {
          state.analysisOpen.wrong = true;
          return render();
        }
        return setScreen("variant");
      }
      if (state.screen === "variant") {
        state.answer.variant ||= "B";
        if (!state.analysisOpen.variant) {
          state.analysisOpen.variant = true;
          return render();
        }
        return setScreen("report");
      }
      return setScreen("entry");
    });

    renderTimeline();
    render();
  </script>
</body>
</html>
