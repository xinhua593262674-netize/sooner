<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>智能复习 · 闪卡</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #2178ff;
      --ink: #101522;
      --muted: #87909f;
      --line: #e6ebf2;
      --red: #ee402f;
    }

    * { box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      background: #eef3fb;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 20%, rgba(33, 120, 255, .11), transparent 28rem),
        #eef3fb;
    }

    button {
      border: 0;
      padding: 0;
      font: inherit;
      color: inherit;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { transform: scale(.98); }

    .app {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 393px;
      height: 852px;
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      background: #f2f7ff;
      box-shadow: 0 0 60px rgba(32, 50, 85, .15);
    }

    .demo-scenes {
      position: fixed;
      left: calc(50% + 212px);
      top: max(0px, calc((100dvh - 852px) / 2));
      z-index: 30;
      display: grid;
      gap: 7px;
      width: 112px;
      padding: 9px;
      border: 1px solid #e1e7f1;
      border-radius: 14px;
      background: rgba(255, 255, 255, .95);
      box-shadow: 0 10px 30px rgba(24, 45, 78, .12);
    }

    .demo-scenes > span { color: #667085; font-size: 11px; text-align: center; }
    .scene-btn { height: 30px; border: 1px solid #dfe6f2; border-radius: 999px; color: #667085; background: #fff; font-size: 12px; font-weight: 650; }
    .scene-btn.active { border-color: #2478ff; color: #2478ff; background: #eef5ff; }

    .top {
      flex: none;
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid #eef1f6;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 6px 27px 0 31px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cellular {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .cellular i {
      display: block;
      width: 3px;
      border-radius: 1px;
      background: #111;
    }

    .cellular i:nth-child(1) { height: 4px; }
    .cellular i:nth-child(2) { height: 6px; }
    .cellular i:nth-child(3) { height: 9px; }
    .cellular i:nth-child(4) { height: 12px; }

    .wifi {
      position: relative;
      width: 15px;
      height: 12px;
      overflow: hidden;
    }

    .wifi::before,
    .wifi::after {
      position: absolute;
      left: 50%;
      border: 2px solid #111;
      border-right-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      transform: translateX(-50%) rotate(45deg);
      content: "";
    }

    .wifi::before { top: 0; width: 13px; height: 13px; }
    .wifi::after { top: 5px; width: 6px; height: 6px; }

    .battery {
      position: relative;
      display: grid;
      place-items: center;
      width: 23px;
      height: 12px;
      border: 1px solid #8e8e8e;
      border-radius: 3px;
      color: #fff;
      background: #171717;
      font-size: 8px;
      line-height: 1;
    }

    .battery::after {
      position: absolute;
      right: -3px;
      width: 2px;
      height: 6px;
      border-radius: 0 2px 2px 0;
      background: #999;
      content: "";
    }

    .navbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 57px;
    }

    .navbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 680;
      letter-spacing: .5px;
    }

    .back,
    .close {
      position: absolute;
      top: 50%;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      transform: translateY(-50%);
    }

    .back { left: 12px; }
    .close { left: 56px; }

    .back::before {
      width: 12px;
      height: 12px;
      border-left: 2px solid #111827;
      border-bottom: 2px solid #111827;
      transform: rotate(45deg);
      content: "";
    }

    .close::before,
    .close::after {
      position: absolute;
      width: 19px;
      height: 2px;
      border-radius: 2px;
      background: #111827;
      content: "";
    }

    .close::before { transform: rotate(45deg); }
    .close::after { transform: rotate(-45deg); }

    .steps {
      display: grid;
      grid-template-columns: minmax(88px, 1fr) 18px minmax(88px, 1fr) 18px minmax(88px, 1fr);
      align-items: center;
      height: 58px;
      padding: 0 16px;
      color: #a5abb7;
      font-size: 12px;
    }

    .step {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 100%;
      white-space: nowrap;
    }

    .step.active {
      color: var(--blue);
      font-weight: 620;
    }

    .step.active::after {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      border-radius: 999px;
      background: var(--blue);
      content: "";
    }

    .step-number {
      display: grid;
      place-items: center;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      color: #fff;
      background: var(--blue);
      font-size: 12px;
    }

    .lock {
      position: relative;
      width: 16px;
      height: 14px;
      border-radius: 3px;
      background: #a9afba;
    }

    .lock::before {
      position: absolute;
      left: 3px;
      top: -7px;
      width: 8px;
      height: 8px;
      border: 2px solid #a9afba;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
      content: "";
    }

    .connector {
      height: 1px;
      background: #d5dae3;
    }

    .workspace {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 22%, rgba(124, 180, 255, .2), transparent 17rem),
        linear-gradient(180deg, #eef6ff 0%, #f6f9ff 100%);
    }

    .page-progress {
      height: 30px;
      padding-right: 21px;
      color: var(--blue);
      font-size: 15px;
      text-align: right;
    }

    .deck {
      position: relative;
      height: calc(100% - 58px);
      min-height: 585px;
      perspective: 1200px;
    }

    .deck::before,
    .deck::after {
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 42px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 3px 13px rgba(46, 94, 157, .08);
      content: "";
    }

    .deck::before { left: -22px; }
    .deck::after { right: -22px; }

    .flashcard {
      position: absolute;
      inset: 8px 37px;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.2, .75, .2, 1);
    }

    .flashcard.flipped { transform: rotateY(180deg); }

    .card-arrow {
      position: absolute;
      top: 50%;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 34px;
      height: 48px;
      border: 1px solid rgba(223, 230, 242, .95);
      border-radius: 18px;
      color: var(--blue);
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 6px 18px rgba(35, 75, 128, .1);
      transform: translateY(-50%);
      font-size: 28px;
      font-weight: 700;
    }

    .card-arrow.prev { left: 4px; }
    .card-arrow.next { right: 4px; }
    .card-arrow:disabled {
      color: #b8c2d1;
      background: rgba(247, 249, 252, .88);
      box-shadow: none;
      cursor: not-allowed;
      transform: translateY(-50%);
    }

    .card-arrow:active:not(:disabled) { transform: translateY(-50%) scale(.96); }

    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 22px 20px 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 22px;
      background: rgba(255, 255, 255, .98);
      box-shadow: 0 7px 24px rgba(61, 113, 181, .13);
      backface-visibility: hidden;
    }

    .card-back { transform: rotateY(180deg); }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #7f8793;
      font-size: 15px;
    }

    .favorite {
      position: relative;
      width: 27px;
      height: 27px;
      transition: transform .2s ease;
    }

    .favorite svg {
      width: 100%;
      height: 100%;
      fill: transparent;
      stroke: #7f8793;
      stroke-width: 2;
    }

    .favorite.active svg {
      fill: #ffd75a;
      stroke: #f5af16;
    }

    .question {
      margin: 24px 0 22px;
      font-size: 18px;
      line-height: 1.65;
      font-weight: 670;
      letter-spacing: .2px;
    }

    .divider {
      height: 1px;
      background: var(--line);
    }

    .answer {
      flex: 1;
      min-height: 0;
      padding-top: 28px;
      overflow-y: auto;
      scrollbar-width: none;
      font-size: 15px;
      line-height: 2.05;
    }

    .answer::-webkit-scrollbar { display: none; }

    .answer h2 {
      margin: 0 0 18px;
      color: var(--blue);
      font-size: 18px;
      font-weight: 650;
    }

    .answer p { margin: 0 0 7px; }
    .answer strong { color: var(--red); font-weight: 650; }

    .flip-hint {
      display: grid;
      place-items: center;
      flex: 1;
      color: #77869b;
      text-align: center;
    }

    .flip-hint span {
      display: block;
      margin-bottom: 13px;
      font-size: 38px;
    }

    .flip-hint strong {
      display: block;
      color: var(--blue);
      font-size: 16px;
      margin-bottom: 6px;
    }

    .recall-hint {
      display: none;
      place-items: center;
      flex: 1;
      color: #d7dce5;
      font-size: 14px;
      letter-spacing: .2px;
      text-align: center;
    }

    .flashcard[data-phase="preview-question"] .flip-hint,
    .flashcard[data-phase="recall"] .flip-hint {
      display: none;
    }

    .flashcard[data-phase="preview-question"] .recall-hint {
      display: grid;
    }

    .tip {
      margin: 8px 0 0;
      color: #8b93a1;
      font-size: 12px;
      text-align: center;
    }

    .home-indicator {
      width: 122px;
      height: 5px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: #050505;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 30;
      padding: 9px 15px;
      border-radius: 999px;
      color: #fff;
      background: rgba(16, 21, 34, .9);
      box-shadow: 0 8px 22px rgba(0, 0, 0, .17);
      font-size: 12px;
      transform: translate(-50%, 15px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .completion {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 30px;
      background: rgba(242, 247, 255, .92);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .completion.show {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-card {
      width: 100%;
      padding: 31px 24px 24px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(43, 89, 151, .18);
      text-align: center;
    }

    .completion-icon { font-size: 46px; }

    .completion h2 {
      margin: 13px 0 8px;
      font-size: 21px;
    }

    .completion p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .continue-btn {
      width: 100%;
      height: 47px;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, #2c83ff, #176cf1);
      box-shadow: 0 9px 20px rgba(33, 120, 255, .22);
      font-weight: 650;
    }

    @media (min-width: 430px), (min-height: 890px) {
      .app { border-radius: 26px; }
    }

    @media (max-width: 392px) {
      .app { width: 100vw; height: 100dvh; border-radius: 0; }
      .demo-scenes { left: auto; right: 10px; top: auto; bottom: 12px; }
    }

    @media (min-width: 393px) and (max-height: 851px) {
      .app { width: 393px; height: 100dvh; border-radius: 0; }
      .deck { min-height: 535px; }
    }
  </style>
</head>
<body>
  <aside class="demo-scenes" aria-label="练习场景切换">
    <span>Demo 场景</span>
    <button class="scene-btn" data-scene="entry">入口</button>
    <button class="scene-btn" data-scene="review">复习专区</button>
    <button class="scene-btn active" data-scene="flashcard">背诵闪卡</button>
    <button class="scene-btn" data-scene="wrong">考点精练</button>
    <button class="scene-btn" data-scene="variant">举一反三</button>
    <button class="scene-btn" data-scene="report">复习报告</button>
  </aside>

  <div class="app">
    <header class="top">
      <div class="statusbar">
        <span>10:11</span>
        <div class="status-icons" aria-hidden="true">
          <span class="cellular"><i></i><i></i><i></i><i></i></span>
          <span class="wifi"></span>
          <span class="battery">56</span>
        </div>
      </div>

      <div class="navbar">
        <button class="back" aria-label="返回"></button>
        <button class="close" aria-label="退出复习"></button>
        <h1>智能复习</h1>
      </div>

      <nav class="steps" aria-label="复习进度">
        <div class="step active"><span class="step-number">1</span><span>背诵闪卡</span></div>
        <span class="connector"></span>
        <div class="step"><span class="lock"></span><span>2 考点精练</span></div>
        <span class="connector"></span>
        <div class="step"><span class="lock"></span><span>3 举一反三</span></div>
      </nav>
    </header>

    <main class="workspace">
      <div class="page-progress"><span id="progress">1/2</span></div>

      <section class="deck" aria-label="知识点闪卡">
        <button class="card-arrow prev" data-action="prev-card" aria-label="上一张闪卡">‹</button>
        <div class="flashcard flipped" id="flashcard">
          <article class="card-face card-front">
            <div class="card-head">
              <span class="card-index">1/2</span>
              <button class="favorite" aria-label="收藏闪卡">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2.8 2.8 5.7 6.3.9-4.6 4.5 1.1 6.3-5.6-3-5.6 3 1.1-6.3-4.6-4.5 6.3-.9L12 2.8Z"/></svg>
              </button>
            </div>
            <h2 class="question">资金时间价值计算中，现值与终值换算的核心公式是什么？</h2>
            <div class="divider"></div>
          </article>

          <article class="card-face card-back">
            <div class="card-head">
              <span class="card-index">1/2</span>
              <button class="favorite" aria-label="收藏闪卡">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2.8 2.8 5.7 6.3.9-4.6 4.5 1.1 6.3-5.6-3-5.6 3 1.1-6.3-4.6-4.5 6.3-.9L12 2.8Z"/></svg>
              </button>
            </div>
            <h2 class="question">资金时间价值计算中，现值与终值换算的核心公式是什么？</h2>
            <div class="divider"></div>
            <div class="answer">
              <h2>答案</h2>
              <p>现值与终值换算的核心公式为：</p>
              <p>终值公式：<strong>F=P(1+i)^n</strong></p>
              <p>现值公式：<strong>P=F/(1+i)^n</strong></p>
              <p>其中，<strong>利率 i</strong> 为资金的时间价值率，<strong>期数 n</strong> 为计算的时间长度。</p>
            </div>
          </article>
        </div>
        <button class="card-arrow next" data-action="next-card" aria-label="下一张闪卡">›</button>
      </section>

      <p class="tip">阅读闪卡内容，快速补齐本考点关键知识</p>
      <div class="home-indicator"></div>
    </main>

    <div class="toast" role="status" aria-live="polite"></div>

    <section class="completion" aria-label="闪卡完成">
      <div class="completion-card">
        <div class="completion-icon">🎉</div>
        <h2>闪卡复习完成</h2>
        <p>已完成 2 张知识点闪卡<br />接下来进入错题再练</p>
        <button class="continue-btn">进入错题练习</button>
      </div>
    </section>
  </div>

  <script>
    const cardSets = {
      "1": [
      {
        question: "资金时间价值计算中，现值与终值换算的核心公式是什么？",
        answer: `
          <h2>答案</h2>
          <p>现值与终值换算的核心公式为：</p>
          <p>终值公式：<strong>F=P(1+i)^n</strong></p>
          <p>现值公式：<strong>P=F/(1+i)^n</strong></p>
          <p>其中，<strong>利率 i</strong> 为资金的时间价值率，<strong>期数 n</strong> 为计算的时间长度。</p>
        `
      },
      {
        question: "名义利率与有效利率之间应如何进行换算？",
        answer: `
          <h2>答案</h2>
          <p>当一年内计息 <strong>m</strong> 次时：</p>
          <p>计息周期利率：<strong>i = r / m</strong></p>
          <p>年有效利率：<strong>iₑff = (1+r/m)^m - 1</strong></p>
          <p>名义利率只反映计息周期利率之和，有效利率还考虑了周期内的<strong>复利效应</strong>。</p>
        `
      }
      ],
      "2": [
        {
          question: "现值与终值换算时，如何判断应使用复利现值系数还是复利终值系数？",
          answer: `
            <h2>答案</h2>
            <p>判断的关键是明确资金换算的<strong>时间方向</strong>：</p>
            <p>由现在推算未来，使用复利终值系数：<strong>F=P(F/P,i,n)</strong></p>
            <p>由未来折算现在，使用复利现值系数：<strong>P=F(P/F,i,n)</strong></p>
            <p>可以简单记忆为：<strong>往后算终值，往前折现值</strong>。</p>
          `
        },
        {
          question: "等额支付系列中，年金现值与年金终值的使用场景有什么区别？",
          answer: `
            <h2>答案</h2>
            <p>年金现值用于把未来连续等额收支折算到当前时点：</p>
            <p><strong>P=A(P/A,i,n)</strong></p>
            <p>年金终值用于计算连续等额收支在期末累计形成的金额：</p>
            <p><strong>F=A(F/A,i,n)</strong></p>
          `
        }
      ]
    };

    const query = new URLSearchParams(location.search);
    const pointIndex = query.get("point") === "2" ? "2" : "1";
    const pointName = query.get("name") || (
      pointIndex === "2" ? "现值与终值换算" : "资金时间价值计算基础"
    );
    const cards = cardSets[pointIndex];
    document.title = `${pointName} · 闪卡`;

    document.querySelectorAll(".scene-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const params = `point=${pointIndex}&name=${encodeURIComponent(pointName)}`;
        const memberParam = query.get("member") ? `&member=${query.get("member")}` : "";
        const memberQuery = query.get("member") ? `?member=${query.get("member")}` : "";
        if (button.dataset.scene === "entry") {
          location.href = "01_入口_会员态_demo.html";
        } else if (button.dataset.scene === "review") {
          location.href = `03_考点推荐_demo.html${memberQuery}`;
        } else if (button.dataset.scene === "wrong") {
          location.href = `05_错题_06_变式题_demo.html?${params}${memberParam}`;
        } else if (button.dataset.scene === "variant") {
          location.href = `05_错题_06_变式题_demo.html?${params}&start=variant${memberParam}`;
        } else if (button.dataset.scene === "report") {
          location.href = `07_答题报告_demo.html?${params}${memberParam}`;
        }
      });
    });

    const flashcard = document.querySelector("#flashcard");
    const toast = document.querySelector(".toast");
    const completion = document.querySelector(".completion");
    let current = 0;
    let phase = "evaluate";
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function setPhase(nextPhase) {
      phase = nextPhase;
      flashcard.dataset.phase = phase;
      flashcard.classList.add("flipped");
    }

    function renderCard() {
      const card = cards[current];
      const index = `${current + 1}/${cards.length}`;
      document.querySelector("#progress").textContent = index;
      document.querySelectorAll(".card-index").forEach((node) => node.textContent = index);
      document.querySelectorAll(".question").forEach((node) => node.textContent = card.question);
      document.querySelector(".answer").innerHTML = card.answer;
      document.querySelector('[data-action="prev-card"]').disabled = current === 0;
      document.querySelector('[data-action="next-card"]').disabled = false;
      document.querySelector('[data-action="next-card"]').setAttribute(
        "aria-label",
        current === cards.length - 1 ? "进入错题练习" : "下一张闪卡"
      );
      document.querySelectorAll(".favorite").forEach((button) => button.classList.remove("active"));
      setPhase("evaluate");
    }

    document.querySelector(".card-front").addEventListener("click", (event) => {
      if (!event.target.closest(".favorite")) setPhase("evaluate");
    });

    document.querySelector(".card-back").addEventListener("click", (event) => {
      if (!event.target.closest("button")) setPhase("evaluate");
    });

    document.querySelectorAll(".favorite").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        const active = !button.classList.contains("active");
        document.querySelectorAll(".favorite").forEach((item) => item.classList.toggle("active", active));
        showToast(active ? "已收藏这张闪卡" : "已取消收藏");
      });
    });

    document.querySelector(".back").addEventListener("click", () => history.back());
    document.querySelector(".close").addEventListener("click", () => showToast("已保存当前复习进度"));
    function goWrongPractice() {
      const memberParam = query.get("member") ? `&member=${query.get("member")}` : "";
      location.href =
        `05_错题_06_变式题_demo.html?point=${pointIndex}&name=${encodeURIComponent(pointName)}${memberParam}`;
    }

    function switchCard(direction) {
      const next = current + direction;
      if (next < 0 || next >= cards.length) return;
      current = next;
      const offset = direction > 0 ? -45 : 45;
      flashcard.animate(
        [{ transform: "translateX(0)", opacity: 1 }, { transform: `translateX(${offset}px)`, opacity: 0 }],
        { duration: 180, easing: "ease-in" }
      ).finished.then(() => renderCard());
    }

    document.querySelector('[data-action="prev-card"]').addEventListener("click", () => switchCard(-1));
    document.querySelector('[data-action="next-card"]').addEventListener("click", () => {
      if (current === cards.length - 1) {
        goWrongPractice();
        return;
      }
      switchCard(1);
    });

    document.querySelector(".continue-btn").addEventListener("click", goWrongPractice);

    renderCard();
  </script>
</body>
</html>
