<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>复习专区 · 考点推荐</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #176bff;
      --blue-2: #075cf2;
      --orange: #ff6b24;
      --orange-soft: #fff7f1;
      --green: #08b64e;
      --ink: #10182b;
      --muted: #707b92;
      --line: #e8edf5;
      --panel: #f8faff;
    }

    * { box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      background: #eef2f8;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 12%, rgba(23, 107, 255, .08), transparent 32rem),
        #eef2f8;
    }

    button {
      border: 0;
      padding: 0;
      font: inherit;
      color: inherit;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { opacity: .72; }

    .app {
      display: flex;
      flex-direction: column;
      width: 393px;
      height: 852px;
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: contain;
      scrollbar-width: none;
      background: #fff;
      box-shadow: 0 0 60px rgba(32, 50, 85, .13);
      -webkit-overflow-scrolling: touch;
    }

    .app::-webkit-scrollbar { display: none; }

    .scenario-switch {
      position: fixed;
      left: calc(50% + 212px);
      top: max(0px, calc((100dvh - 852px) / 2));
      z-index: 30;
      display: grid;
      gap: 8px;
      width: 112px;
      padding: 8px;
      border: 1px solid #e1e7f1;
      border-radius: 14px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 10px 30px rgba(24, 45, 78, .12);
      backdrop-filter: blur(12px);
    }

    .scenario-switch span {
      color: #667085;
      font-size: 11px;
      text-align: center;
    }

    .scenario-btn {
      height: 30px;
      border: 1px solid #dfe6f2;
      border-radius: 999px;
      color: #667085;
      background: #fff;
      font-size: 12px;
      font-weight: 650;
    }

    .scenario-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      background: #eef5ff;
    }

    header {
      position: relative;
      z-index: 10;
      flex: none;
      background: rgba(255, 255, 255, .98);
      box-shadow: 0 1px 0 rgba(232, 237, 245, .96);
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 45px;
      padding: 5px 27px 0 31px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cellular {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .cellular i {
      display: block;
      width: 3px;
      border-radius: 1px;
      background: #111;
    }

    .cellular i:nth-child(1) { height: 4px; }
    .cellular i:nth-child(2) { height: 6px; }
    .cellular i:nth-child(3) { height: 9px; }
    .cellular i:nth-child(4) { height: 12px; }

    .wifi {
      position: relative;
      width: 15px;
      height: 12px;
      overflow: hidden;
    }

    .wifi::before,
    .wifi::after {
      position: absolute;
      left: 50%;
      border: 2px solid #111;
      border-right-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      transform: translateX(-50%) rotate(45deg);
      content: "";
    }

    .wifi::before {
      top: 0;
      width: 13px;
      height: 13px;
    }

    .wifi::after {
      top: 5px;
      width: 6px;
      height: 6px;
    }

    .battery {
      position: relative;
      display: grid;
      place-items: center;
      width: 23px;
      height: 12px;
      border: 1px solid #909090;
      border-radius: 3px;
      color: #fff;
      background: #171717;
      font-size: 8px;
      line-height: 1;
    }

    .battery::after {
      position: absolute;
      right: -3px;
      width: 2px;
      height: 6px;
      border-radius: 0 2px 2px 0;
      background: #999;
      content: "";
    }

    .navbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 55px;
    }

    .navbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: .7px;
    }

    .nav-icon {
      position: absolute;
      top: 50%;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      transform: translateY(-50%);
    }

    .back { left: 12px; }
    .back::before {
      width: 11px;
      height: 11px;
      border-left: 2px solid #121b2e;
      border-bottom: 2px solid #121b2e;
      transform: rotate(45deg);
      content: "";
    }

    .subject-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: 57px;
      border-bottom: 1px solid var(--line);
    }

    .subject-tab {
      position: relative;
      color: #697389;
      font-size: 15px;
    }

    .subject-tab.active {
      color: var(--blue);
      font-weight: 650;
    }

    .subject-tab.active::after {
      position: absolute;
      bottom: 4px;
      left: 50%;
      width: 17px;
      height: 3px;
      border-radius: 999px;
      background: var(--blue);
      transform: translateX(-50%);
      box-shadow: 0 2px 5px rgba(23, 107, 255, .22);
      content: "";
    }

    .overview {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      height: 43px;
      padding: 0 37px;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      white-space: nowrap;
    }

    .overview-item {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 5px;
      color: #313a4c;
    }

    .overview strong {
      color: var(--blue);
      font-size: 15px;
      font-weight: 650;
    }

    .overview .done strong { color: var(--green); }
    .overview-dot { color: #162033; font-size: 12px; }

    .app.non-member header > .overview {
      display: none;
    }

    main {
      flex: 1;
      min-height: 0;
      padding: 0 16px max(34px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
      background: linear-gradient(#fff 0 300px, #fbfcff 500px);
      -webkit-overflow-scrolling: touch;
    }

    main::-webkit-scrollbar { display: none; }

    .member-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 40px;
      margin: 0;
      padding: 8px 18px 8px 20px;
      border-top: 1px solid #f8dfb8;
      border-bottom: 1px solid #f3d29b;
      color: #8b5b11;
      background:
        radial-gradient(circle at 6% 0, rgba(255, 255, 255, .65), transparent 42px),
        linear-gradient(100deg, #fff1d2 0%, #ffe4b8 100%);
      font-size: 12px;
      line-height: 1.45;
    }

    .member-banner > div {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 8px;
    }

    .member-banner strong {
      flex: none;
      display: inline-grid;
      place-items: center;
      height: 20px;
      padding: 0 5px;
      border-radius: 4px;
      color: #aa6900;
      background: rgba(255, 199, 72, .58);
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.2px;
      font-style: italic;
    }

    .member-banner p {
      overflow: hidden;
      margin: 0;
      color: #9b671e;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .member-banner button {
      flex: none;
      height: 26px;
      padding: 0 12px;
      border-radius: 999px;
      color: #fff;
      background: #9b5c08;
      box-shadow: 0 4px 9px rgba(119, 70, 8, .16);
      font-size: 12px;
      font-weight: 700;
    }

    .app.non-member .member-banner {
      display: flex;
    }

    .main-overview {
      display: none;
      height: 48px;
      margin: 8px 0 16px;
      padding: 0 26px;
      border: 1px solid #edf1f7;
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 5px 16px rgba(24, 45, 78, .045);
    }

    .app.non-member .main-overview {
      display: grid;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin: 13px 0 9px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 11px;
    }

    .recommend-card {
      overflow: hidden;
      border: 1px solid #ff9d65;
      border-radius: 8px;
      background: linear-gradient(105deg, #fffaf7 0%, #fff 70%);
      box-shadow: 0 5px 18px rgba(255, 107, 36, .055);
    }

    .recommend-main {
      position: relative;
      min-height: 80px;
      padding: 13px 58px 11px 39px;
    }

    .rank {
      position: absolute;
      left: 8px;
      top: 13px;
      display: grid;
      place-items: center;
      width: 19px;
      height: 19px;
      border: 1px solid #ffd5be;
      border-radius: 50%;
      color: var(--orange);
      background: #fff4ed;
      font-size: 13px;
      font-weight: 650;
    }

    .recommend-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: #69748a;
      font-size: 10px;
      white-space: nowrap;
    }

    .today {
      flex: none;
      padding: 3px 7px;
      border: 1px solid #ff9d65;
      border-radius: 999px;
      color: var(--orange);
      background: #fff;
    }

    .breadcrumb {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recommend-main h3 {
      margin: 7px 0 4px;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 680;
    }

    .reason {
      color: #79849a;
      font-size: 10px;
    }

    .recommend-badge {
      position: absolute;
      right: 10px;
      top: 9px;
      padding: 3px 6px;
      border-radius: 4px;
      color: #fff;
      background: var(--orange);
      font-size: 10px;
    }

    .recommend-badge.mastered {
      color: #07883e;
      background: #eaf9f0;
      border: 1px solid #87d7a8;
    }

    .practice {
      width: 100%;
      height: 38px;
      border-radius: 7px;
      color: #fff;
      background: linear-gradient(135deg, #176bff, #0b5cf0);
      box-shadow: 0 6px 14px rgba(23, 107, 255, .22);
      font-size: 15px;
      font-weight: 680;
    }

    .recommend-action {
      padding: 11px 12px 12px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .recommend-action p {
      margin: 7px 0 0;
      color: #8a94a8;
      font-size: 10px;
      text-align: center;
    }

    .recommend-row {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 54px;
      padding: 9px 92px 8px 39px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .recommend-row .rank {
      top: 14px;
      border-color: #dfe5ef;
      color: #252f42;
      background: #f7f9fc;
    }

    .recommend-row h3 {
      margin: 0 0 4px;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 650;
    }

    .tag {
      position: absolute;
      right: 10px;
      padding: 3px 7px;
      border: 1px solid;
      border-radius: 5px;
      font-size: 10px;
      white-space: nowrap;
    }

    .tag.orange {
      border-color: #ff8d4e;
      color: var(--orange);
      background: #fff;
    }

    .tag.blue {
      border-color: #b8d3ff;
      color: var(--blue);
      background: #f5f9ff;
    }

    .lock-mark {
      display: none;
      align-items: center;
      gap: 3px;
      padding: 3px 6px;
      border-radius: 999px;
      color: #8b5a00;
      background: linear-gradient(135deg, #fff0bc, #ffd263);
      font-size: 9px;
      font-weight: 800;
    }

    .lock-mark::before {
      content: "🔒";
      font-size: 9px;
    }

    .app.non-member .recommend-row {
      background: #fbfcff;
    }

    .app.non-member .recommend-row .tag {
      display: none;
    }

    .app.non-member .recommend-row .lock-mark {
      display: inline-flex;
      position: absolute;
      right: 10px;
    }

    .review-area-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0 11px;
      font-size: 15px;
      line-height: 1;
      font-weight: 700;
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 11px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter {
      flex: none;
      min-width: 51px;
      height: 26px;
      padding: 0 14px;
      border: 1px solid #e0e5ee;
      border-radius: 999px;
      color: #333c4e;
      background: #fafbfe;
      font-size: 12px;
    }

    .filter.active {
      border-color: var(--blue);
      color: var(--blue);
      background: #fff;
      box-shadow: 0 3px 9px rgba(23, 107, 255, .08);
    }

    .outline-card {
      padding: 12px;
      border: 1px solid #e2e7f0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(40, 66, 110, .045);
    }

    .outline-header,
    .chapter-header {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 28px;
      text-align: left;
    }

    .outline-header { padding: 0 0 9px; }

    .collapse-icon {
      position: relative;
      flex: none;
      width: 15px;
      height: 15px;
      margin-right: 12px;
      border: 1px solid var(--blue);
      border-radius: 2px;
      background: var(--blue);
      box-shadow: 0 2px 5px rgba(23, 107, 255, .18);
    }

    .collapse-icon::before,
    .collapse-icon::after {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 7px;
      height: 1px;
      background: #fff;
      transform: translate(-50%, -50%);
      content: "";
    }

    .collapsed .collapse-icon {
      background: #fff;
    }

    .collapsed .collapse-icon::before { background: var(--blue); }
    .collapsed .collapse-icon::after {
      background: var(--blue);
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .outline-label {
      flex: 1;
      font-size: 12px;
      font-weight: 670;
    }

    .outline-count {
      margin-right: 11px;
      color: #717c92;
      font-size: 10px;
    }

    .chevron {
      width: 7px;
      height: 7px;
      margin-right: 3px;
      border-right: 1px solid #516078;
      border-bottom: 1px solid #516078;
      transform: rotate(225deg);
      transition: transform .2s ease;
    }

    .collapsed .chevron { transform: rotate(45deg); }

    .chapter-card {
      overflow: hidden;
      border: 1px solid #e7ebf3;
      border-radius: 7px;
      background: #fff;
    }

    .chapter-header {
      min-height: 39px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--line);
    }

    .chapter-header .collapse-icon { margin-right: 12px; }

    .chapter-body {
      overflow: hidden;
      transition: max-height .28s ease, opacity .2s ease;
      max-height: 1200px;
      opacity: 1;
    }

    .chapter-card.collapsed .chapter-header { border-bottom: 0; }
    .chapter-card.collapsed .chapter-body {
      max-height: 0;
      opacity: 0;
    }

    .point-row {
      position: relative;
      display: grid;
      grid-template-columns: 32px 1fr auto 12px;
      align-items: center;
      gap: 9px;
      width: 100%;
      min-height: 53px;
      padding: 8px 10px 8px 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
      transition: background .16s ease;
    }

    .point-row:active { background: #f6f9ff; }

    .app.non-member .point-row:not([data-free="true"]) {
      color: #8b94a5;
      background: #fbfcff;
    }

    .app.non-member .point-row:not([data-free="true"]) .point-number,
    .app.non-member .point-row:not([data-free="true"]) .point-copy,
    .app.non-member .point-row:not([data-free="true"]) .tag {
      opacity: .58;
    }

    .app.non-member .point-row:not([data-free="true"]) .row-chevron {
      width: auto;
      height: auto;
      border: 0;
      transform: none;
    }

    .app.non-member .point-row:not([data-free="true"]) .row-chevron::before {
      content: "🔒";
      font-size: 12px;
      opacity: .8;
    }

    .point-number {
      display: grid;
      place-items: center;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #f4f7fd;
      font-size: 12px;
      font-weight: 650;
    }

    .point-copy {
      min-width: 0;
      text-align: left;
    }

    .point-row .tag {
      position: static;
      justify-self: end;
    }

    .point-copy h4 {
      overflow: hidden;
      margin: 0 0 4px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .point-copy p {
      overflow: hidden;
      margin: 0;
      color: #788399;
      font-size: 10px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-chevron {
      width: 7px;
      height: 7px;
      border-top: 1px solid #526079;
      border-right: 1px solid #526079;
      transform: rotate(45deg);
    }

    .view-all {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 44px;
      color: var(--blue);
      font-size: 12px;
    }

    .view-all .row-chevron { border-color: var(--blue); }

    .view-all.expanded .row-chevron {
      transform: rotate(225deg);
    }

    .point-row.is-extra:not(.is-revealed),
    .point-row.is-filtered,
    .chapter-card.is-filtered {
      display: none;
    }

    .chapter-compact {
      margin-top: 0;
      border-top: 1px solid var(--line);
    }

    .chapter-compact .chapter-header {
      border-bottom: 0;
      min-height: 42px;
    }

    .chapter-compact:first-of-type { border-top: 0; }

    .chapter-list {
      overflow: hidden;
      margin-top: 0;
      border: 1px solid #e7ebf3;
      border-radius: 0 0 7px 7px;
      border-top: 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 20;
      padding: 10px 17px;
      border-radius: 999px;
      color: #fff;
      background: rgba(16, 24, 43, .9);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .18);
      font-size: 12px;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    @media (min-width: 430px), (min-height: 890px) {
      .app {
        border-radius: 26px;
      }
    }

    @media (max-width: 392px) {
      .app {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
      }

      .scenario-switch {
        left: auto;
        right: 10px;
        top: auto;
        bottom: 12px;
      }
    }

    @media (min-width: 393px) and (max-height: 851px) {
      .app {
        width: 393px;
        height: 100dvh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <aside class="scenario-switch" aria-label="会员场景切换">
    <span>Demo 场景</span>
    <button class="scenario-btn active" data-scene="member">已开通</button>
    <button class="scenario-btn" data-scene="non-member">未开通</button>
  </aside>

  <div class="app">
    <header>
      <div class="statusbar">
        <span>10:11</span>
        <div class="status-icons" aria-hidden="true">
          <span class="cellular"><i></i><i></i><i></i><i></i></span>
          <span class="wifi"></span>
          <span class="battery">56</span>
        </div>
      </div>

      <div class="navbar">
        <button class="nav-icon back" aria-label="返回"></button>
        <h1>复习专区</h1>
      </div>

      <nav class="subject-tabs" aria-label="科目">
        <button class="subject-tab" data-subject="建筑实务">建筑实务</button>
        <button class="subject-tab" data-subject="法规">法规</button>
        <button class="subject-tab active" data-subject="经济">经济</button>
        <button class="subject-tab" data-subject="管理">管理</button>

  <div class="toast" role="status" aria-live="polite"></div>

  <script>
    const app = document.querySelector(".app");
    const toast = document.querySelector(".toast");
    const viewAllButton = document.querySelector('[data-action="all"]');
    const firstChapter = viewAllButton.closest(".chapter-card");
    const practiceButton = document.querySelector('[data-action="practice"]');
    const practiceTip = document.querySelector('[data-role="practice-tip"]');
    const firstStatus = document.querySelector('[data-role="first-status"]');
    let scene = "member";
    let allPointsExpanded = false;
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function canUse(target) {
      return scene === "member" || target.dataset.free === "true";
    }

    function showVipToast() {
      showToast("开通会员后可学习该考点");
    }

    function hasMasteredFirstPoint() {
      try {
        return localStorage.getItem("reviewFirstPointMastered") === "true";
      } catch {
        return false;
      }
    }

    function syncRecommendationProgress() {
      const query = new URLSearchParams(location.search);
      const firstMastered =
        query.get("firstMastered") === "1" ||
        hasMasteredFirstPoint();

      firstStatus.textContent = firstMastered ? "已掌握" : "推荐";
      firstStatus.classList.toggle("mastered", firstMastered);
      practiceButton.textContent = firstMastered ? "继续练习" : "立即练习";
      practiceButton.dataset.startIndex = firstMastered ? "2" : "1";
      practiceButton.dataset.free = firstMastered ? "false" : "true";
      practiceTip.textContent = firstMastered
        ? "第 1 个考点已掌握，将从第 2 个考点继续"
        : "将从第 1 个推荐考点开始";
    }

    document.querySelectorAll(".scenario-btn").forEach((button) => {
      button.addEventListener("click", () => {
        scene = button.dataset.scene;
        app.classList.toggle("non-member", scene === "non-member");
        document.querySelectorAll(".scenario-btn").forEach((item) => {
          item.classList.toggle("active", item === button);
        });
        showToast(scene === "member" ? "已切换：开通会员场景" : "已切换：未开通会员场景");
      });
    });

    document.querySelectorAll(".subject-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelector(".subject-tab.active")?.classList.remove("active");
        tab.classList.add("active");
        showToast(`已切换至${tab.dataset.subject}`);
      });
    });

    document.querySelectorAll(".filter").forEach((filter) => {
      filter.addEventListener("click", () => {
        document.querySelector(".filter.active")?.classList.remove("active");
        filter.classList.add("active");
        applyFilter(filter.dataset.filter);
      });
    });

    function applyFilter(status) {
      const isAll = status === "全部";
      let visibleChapterCount = 0;

      document.querySelectorAll(".chapter-card").forEach((chapter, chapterIndex) => {
        const rows = [...chapter.querySelectorAll(".point-row")];
        let matchedCount = 0;

        rows.forEach((row) => {
          const matches = isAll || row.dataset.status === status;
          row.classList.toggle("is-filtered", !matches);

          if (isAll && row.classList.contains("is-extra")) {
            row.classList.toggle("is-revealed", allPointsExpanded);
          } else if (!isAll && matches) {
            row.classList.add("is-revealed");
          }

          if (matches) matchedCount += 1;
        });

        chapter.classList.toggle("is-filtered", matchedCount === 0);
        if (matchedCount > 0) {
          visibleChapterCount += 1;
          if (!isAll) chapter.classList.remove("collapsed");
          if (isAll && chapterIndex > 0) chapter.classList.add("collapsed");
        }

        const count = chapter.querySelector(".outline-count");
        if (count) {
          const total = count.dataset.total;
          count.textContent = isAll ? `${total} 个待练考点` : `${matchedCount} 个${status}考点`;
        }
      });

      viewAllButton.style.display = isAll ? "flex" : "none";
      document.querySelector(".outline-header .outline-count").textContent =
        isAll ? "3 个推荐章" : `${visibleChapterCount} 个相关章`;

      showToast(isAll ? "已显示全部考点" : `已筛选 ${status} 考点`);
    }

    document.querySelectorAll('[data-collapse="chapter"]').forEach((button) => {
      button.addEventListener("click", () => {
        button.closest(".chapter-card").classList.toggle("collapsed");
      });
    });

    document.querySelector('[data-collapse="outline"]').addEventListener("click", (event) => {
      const button = event.currentTarget;
      const body = document.querySelector(".outline-body");
      const collapsed = button.classList.toggle("collapsed");
      body.style.display = collapsed ? "none" : "block";
    });

    document.querySelector(".back").addEventListener("click", () => {
      location.href = "01_入口_会员态_demo.html";
    });
    practiceButton.addEventListener("click", (event) => {
      if (!canUse(event.currentTarget)) {
        showVipToast();
        return;
      }
      const startIndex = event.currentTarget.dataset.startIndex || "1";
      const pointName = startIndex === "2"
        ? "现值与终值换算"
        : "资金时间价值计算基础";
      location.href =
        `04_闪卡_demo.html?point=${startIndex}&name=${encodeURIComponent(pointName)}`;
    });
    document.querySelectorAll('[data-action="point"]').forEach((row) => {
      row.addEventListener("click", () => {
        if (!canUse(row)) {
          showVipToast();
          return;
        }
        showToast(`打开：${row.querySelector("h4").textContent}`);
      });
    });
    document.querySelector('[data-action="open-vip"]').addEventListener("click", () => {
      showToast("打开会员开通页");
    });
    viewAllButton.addEventListener("click", () => {
      allPointsExpanded = !allPointsExpanded;
      firstChapter.querySelectorAll(".point-row.is-extra").forEach((row) => {
        row.classList.toggle("is-revealed", allPointsExpanded);
      });
      viewAllButton.classList.toggle("expanded", allPointsExpanded);
      viewAllButton.childNodes[0].textContent = allPointsExpanded
        ? "收起部分考点 "
        : "查看全部 8 个考点 ";
      showToast(allPointsExpanded ? "已展开全部 8 个考点" : "已收起部分考点");
    });

    syncRecommendationProgress();
  </script>
